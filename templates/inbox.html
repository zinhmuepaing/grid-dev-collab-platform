{% extends "base.html" %}

{% block title %}Inbox{% endblock %}

{% block content %}
<style>
    /* ---- Inbox-specific enhancements ---- */

    .inbox-sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 16px 16px;
    }

    .inbox-sidebar-header h2 {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.125rem;
        font-weight: 600;
        color: #e6edf3;
        margin: 0;
    }

    .inbox-msg-count {
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--color-text-muted);
        background: rgba(110, 118, 129, 0.15);
        padding: 2px 8px;
        border-radius: 10px;
        letter-spacing: 0.02em;
    }

    /* Search input */
    .inbox-search {
        padding: 0 12px 12px;
    }

    .inbox-search-input {
        width: 100%;
        padding: 8px 12px 8px 34px;
        font-size: 0.8125rem;
        color: var(--color-text);
        background-color: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
        font-family: inherit;
    }

    .inbox-search-input:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.12);
    }

    .inbox-search-input::placeholder {
        color: var(--color-text-muted);
        opacity: 0.6;
    }

    .inbox-search-wrap {
        position: relative;
    }

    .inbox-search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--color-text-muted);
        pointer-events: none;
    }

    /* ---- Chat Bubble (shadcn-inspired: avatar + message side by side) ---- */

    .chat-bubble {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 4px;
    }

    .chat-bubble.sent {
        flex-direction: row-reverse;
    }

    .chat-bubble-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        margin-top: 2px;
    }

    .chat-bubble-message {
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 0.875rem;
        line-height: 1.55;
        max-width: 65%;
        word-wrap: break-word;
        position: relative;
    }

    .chat-bubble-message.sent {
        background: var(--color-primary);
        color: #fff;
        border-bottom-right-radius: 4px;
    }

    .chat-bubble-message.received {
        background: var(--color-surface);
        color: var(--color-text);
        border: 1px solid var(--color-border);
        border-bottom-left-radius: 4px;
    }

    .chat-bubble-message .message-time {
        display: block;
        font-size: 10px;
        margin-top: 4px;
        opacity: 0.55;
        text-align: right;
    }

    .chat-bubble-message.sent .message-time {
        color: rgba(255, 255, 255, 0.6);
    }

    .chat-bubble-message.received .message-time {
        color: var(--color-text-muted);
    }

    /* Failed message */
    .chat-bubble-message.failed {
        opacity: 0.7;
        border: 1px dashed var(--color-danger);
    }

    .chat-bubble-message .retry-btn {
        font-size: 0.7rem;
        color: var(--color-danger);
        cursor: pointer;
        margin-top: 4px;
        display: inline-block;
    }

    .chat-bubble-message .retry-btn:hover {
        text-decoration: underline;
    }

    /* System message */
    .chat-bubble.system {
        justify-content: center;
    }

    .system-message-text {
        font-size: 0.75rem;
        color: var(--color-text-muted);
        background: rgba(110, 118, 129, 0.1);
        padding: 6px 14px;
        border-radius: 20px;
        text-align: center;
        max-width: 85%;
    }

    .system-message-text a {
        color: var(--color-primary);
    }

    /* ---- Chat header ---- */
    .chat-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--color-border);
        background: var(--color-surface);
        flex-shrink: 0;
    }

    .chat-header-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--color-border);
        flex-shrink: 0;
    }

    .chat-header-info {
        flex: 1;
        min-width: 0;
    }

    .chat-header-name {
        font-size: 0.9375rem;
        font-weight: 600;
        color: #e6edf3;
        display: block;
        line-height: 1.2;
    }

    .chat-header-handle {
        font-size: 0.75rem;
        color: var(--color-text-muted);
        font-family: var(--font-mono, 'JetBrains Mono', monospace);
        display: block;
        line-height: 1.3;
    }

    .chat-header-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
    }

    /* Back button */
    #chatBackBtn {
        display: none;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: 6px;
        color: var(--color-text-muted);
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s ease;
    }

    #chatBackBtn:hover {
        background: rgba(110, 118, 129, 0.12);
        color: var(--color-text);
    }

    @media (max-width: 768px) {
        #chatBackBtn {
            display: inline-flex;
        }

        .chat-bubble-message {
            max-width: 80%;
        }

        .chat-header-actions span {
            display: none;
        }
    }

    /* ---- Date dividers ---- */
    .message-date-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 16px 0 8px;
        color: var(--color-text-muted);
        font-size: 0.6875rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .message-date-divider::before,
    .message-date-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--color-border);
    }

    /* ---- Loading indicator (bouncing dots from shadcn MessageLoading) ---- */
    .chat-loading-indicator {
        display: none;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 4px;
        padding: 0 4px;
    }

    .chat-loading-indicator.visible {
        display: flex;
    }

    .chat-loading-indicator .chat-bubble-avatar {
        width: 32px;
        height: 32px;
    }

    .chat-loading-dots {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 10px;
        border-bottom-left-radius: 4px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
    }

    .chat-loading-dots svg {
        color: var(--color-text-muted);
    }

    /* ---- Scroll to bottom button ---- */
    .scroll-to-bottom-btn {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        width: 36px;
        height: 36px;
        display: none;
        align-items: center;
        justify-content: center;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 50%;
        color: var(--color-text-muted);
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        transition: background 0.15s ease, color 0.15s ease;
        z-index: 10;
    }

    .scroll-to-bottom-btn:hover {
        background: var(--color-surface-hover, #1c2128);
        color: var(--color-text);
    }

    .scroll-to-bottom-btn.visible {
        display: flex;
    }

    .chat-messages-wrapper {
        position: relative;
        flex: 1;
        overflow: hidden;
    }

    /* ---- Input area (shadcn ChatInput style: bordered form container) ---- */
    .chat-input-area {
        padding: 16px 20px;
        border-top: 1px solid var(--color-border);
        background: var(--color-surface);
        flex-shrink: 0;
    }

    .chat-input-form {
        border: 1px solid var(--color-border);
        border-radius: 10px;
        background: var(--color-bg);
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
        overflow: hidden;
    }

    .chat-input-form:focus-within {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.1);
    }

    .chat-input-form textarea {
        display: block;
        width: 100%;
        min-height: 48px;
        max-height: 120px;
        padding: 12px 16px;
        font-size: 0.875rem;
        color: var(--color-text);
        background: transparent;
        border: none;
        resize: none;
        outline: none;
        line-height: 1.5;
        font-family: inherit;
    }

    .chat-input-form textarea::placeholder {
        color: var(--color-text-muted);
        opacity: 0.6;
    }

    .chat-input-footer {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 12px 12px;
    }

    .chat-send-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        font-size: 0.8125rem;
        font-weight: 500;
        color: #fff;
        background: var(--color-primary);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s ease;
        white-space: nowrap;
    }

    .chat-send-btn:hover {
        background: #388bfd;
    }

    .chat-send-btn:active {
        background: #1a5fc7;
    }

    .chat-send-btn svg {
        width: 14px;
        height: 14px;
    }

    /* ---- Discord invite card ---- */
    .discord-invite-card {
        display: flex;
        align-items: center;
        gap: 12px;
        max-width: 380px;
        margin: 8px auto;
        background: linear-gradient(135deg, rgba(88, 101, 242, 0.12), rgba(139, 92, 246, 0.08));
        border: 1px solid rgba(88, 101, 242, 0.25);
        border-left: 3px solid #5865f2;
        border-radius: 10px;
        padding: 14px 18px;
    }

    .discord-invite-icon {
        flex-shrink: 0;
    }

    .discord-invite-icon svg {
        width: 28px;
        height: 28px;
    }

    .discord-invite-info {
        flex: 1;
        min-width: 0;
    }

    .discord-invite-label {
        font-size: 0.8125rem;
        font-weight: 600;
        color: #e6edf3;
        margin-bottom: 2px;
    }

    .discord-invite-desc {
        font-size: 0.7rem;
        color: var(--color-text-muted);
        line-height: 1.4;
    }

    .discord-join-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 7px 16px;
        font-size: 0.8125rem;
        font-weight: 600;
        color: #fff !important;
        background: #5865f2;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none !important;
        transition: background 0.15s ease;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .discord-join-btn:hover {
        background: #4752c4;
        color: #fff !important;
    }

    /* ---- Empty states ---- */
    .inbox-empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        padding: 40px 24px;
    }

    .empty-state-icon {
        width: 64px;
        height: 64px;
        color: var(--color-border);
        margin-bottom: 16px;
        opacity: 0.6;
    }

    .empty-state-title {
        font-size: 1.0625rem;
        font-weight: 600;
        color: var(--color-text);
        margin-bottom: 6px;
    }

    .empty-state-desc {
        font-size: 0.8125rem;
        color: var(--color-text-muted);
        max-width: 260px;
        line-height: 1.5;
        margin-bottom: 16px;
    }

    .empty-state-cta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        font-size: 0.8125rem;
        font-weight: 500;
        color: #fff;
        background: var(--color-primary);
        border-radius: 8px;
        text-decoration: none;
        transition: background 0.15s ease;
    }

    .empty-state-cta:hover {
        background: #4c9aff;
        color: #fff;
    }
</style>

<div class="inbox-layout">
    <!-- Sidebar: conversation list (kept as-is) -->
    <aside class="inbox-sidebar">
        <div class="inbox-sidebar-header">
            <h2>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2" />
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                </svg>
                Messages
                <span class="inbox-msg-count" id="inboxMsgCount"></span>
            </h2>
        </div>

        <div class="inbox-search">
            <div class="inbox-search-wrap">
                <svg class="inbox-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" class="inbox-search-input" id="conversationSearch"
                    placeholder="Search conversations..." autocomplete="off" />
            </div>
        </div>

        <div class="conversation-list" id="conversationList">
            <div class="inbox-empty-state">
                <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round" style="width:40px;height:40px">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                <p class="text-muted" style="font-size:0.8125rem">Loading conversations...</p>
            </div>
        </div>
    </aside>

    <!-- Chat panel (redesigned with shadcn patterns) -->
    <section class="chat-panel" id="chatPanel">
        <!-- Empty state -->
        <div class="chat-empty" id="chatEmpty">
            <div class="inbox-empty-state">
                <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                </svg>
                <div class="empty-state-title">Select a conversation</div>
                <p class="empty-state-desc">Choose someone from your messages or find new teammates to start chatting with.</p>
                <a href="/find" class="empty-state-cta">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    Find Teammates
                </a>
            </div>
        </div>

        <!-- Active chat -->
        <div class="chat-active" id="chatActive" style="display:none">
            <!-- Chat header -->
            <div class="chat-header">
                <button id="chatBackBtn" aria-label="Back to conversations">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12" />
                        <polyline points="12 19 5 12 12 5" />
                    </svg>
                </button>
                <img class="chat-header-avatar" id="chatUserAvatar" src="/static/img/default-avatar.svg" alt="">
                <div class="chat-header-info">
                    <span class="chat-header-name" id="chatUserName"></span>
                    <span class="chat-header-handle" id="chatUserHandle"></span>
                </div>
                <div class="chat-header-actions" id="chatHeaderActions"></div>
            </div>

            <!-- Messages area with scroll-to-bottom button -->
            <div class="chat-messages-wrapper">
                <div class="chat-messages" id="chatMessages"></div>

                <!-- Loading indicator (shadcn MessageLoading bouncing dots) -->
                <div class="chat-loading-indicator" id="chatLoadingIndicator">
                    <img class="chat-bubble-avatar" id="chatLoadingAvatar" src="/static/img/default-avatar.svg" alt="">
                    <div class="chat-loading-dots">
                        <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                            <circle cx="4" cy="12" r="2">
                                <animate id="dot1" begin="0;dot3.end+0.25s" attributeName="cy" calcMode="spline" dur="0.6s" values="12;6;12" keySplines=".33,.66,.66,1;.33,0,.66,.33" />
                            </circle>
                            <circle cx="12" cy="12" r="2">
                                <animate begin="dot1.begin+0.1s" attributeName="cy" calcMode="spline" dur="0.6s" values="12;6;12" keySplines=".33,.66,.66,1;.33,0,.66,.33" />
                            </circle>
                            <circle cx="20" cy="12" r="2">
                                <animate id="dot3" begin="dot1.begin+0.2s" attributeName="cy" calcMode="spline" dur="0.6s" values="12;6;12" keySplines=".33,.66,.66,1;.33,0,.66,.33" />
                            </circle>
                        </svg>
                    </div>
                </div>

                <!-- Scroll to bottom (shadcn auto-scroll pattern) -->
                <button class="scroll-to-bottom-btn" id="scrollToBottomBtn" aria-label="Scroll to bottom">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <polyline points="19 12 12 19 5 12" />
                    </svg>
                </button>
            </div>

            <!-- Input area (shadcn ChatInput pattern: bordered form with Send Message button) -->
            <div class="chat-input-area">
                <div class="chat-input-form">
                    <textarea id="messageInput" placeholder="Type your message..." rows="1" maxlength="2000"></textarea>
                    <div class="chat-input-footer">
                        <button class="chat-send-btn" id="sendBtn" type="button">
                            Send Message
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 10 4 15 9 20" />
                                <path d="M20 4v7a4 4 0 0 1-4 4H4" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script type="module">
    import { initInbox } from '/static/js/chat.js';

    document.addEventListener('DOMContentLoaded', () => {
        initInbox();
    });

    // Update conversation count badge
    const conversationList = document.getElementById('conversationList');
    if (conversationList) {
        const observer = new MutationObserver(() => {
            const badge = document.getElementById('inboxMsgCount');
            const items = document.querySelectorAll('#conversationList .conversation-item');
            if (badge) badge.textContent = items.length > 0 ? items.length : '';
        });
        observer.observe(conversationList, { childList: true, subtree: true });
    }
</script>
{% endblock %}
